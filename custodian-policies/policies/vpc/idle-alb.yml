policies:
  - name: alb-mark-idle
    resource: aws.app-elb
    filters:
      # An idle ALB generally has 0 active requests for older periods.
      # Or you can filter when it has 0 target groups. Cloud Custodian natively supports
      # checking the number of target groups for the app-elb.
      - type: value
        key: TargetGroups
        value: empty
      - type: value
        key: "tag:Protection"
        op: not-in
        value_from:
          url: file:custodian-policies/data/allowlist-tags.json
          format: json
    actions:
      - type: mark-for-op
        op: delete
        days: 2

  - name: alb-delete-marked
    resource: aws.app-elb
    filters:
      - type: marked-for-op
        op: delete
    actions:
      - type: delete
