policies:
  - name: alb-mark-idle
    resource: aws.app-elb
    filters:
      - type: value
        key: TargetGroups
        value: empty
      - type: value
        key: "tag:Protection"
        op: not-in
        value_from:
          url: file:custodian-policies/data/allowlist-tags.json
          format: json
    actions:
      - type: mark-for-op
        op: delete
        days: 2

  - name: alb-delete-marked
    resource: aws.app-elb
    filters:
      - type: marked-for-op
        op: delete
    actions:
      - type: delete
